version: '3.8'

services:
  localstack:
    container_name: "${LOCALSTACK_DOCKER_NAME:-localstack-opencv-test}"
    image: localstack/localstack:3.0
    ports:
      - "127.0.0.1:4566:4566"            # LocalStack Gateway
      - "127.0.0.1:4510-4559:4510-4559"  # External services port range
    environment:
      # LocalStack configuration
      - DEBUG=${DEBUG:-0}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LAMBDA_EXECUTOR=${LAMBDA_EXECUTOR:-local}
      - LAMBDA_REMOTE_DOCKER=false
      - LOCALSTACK_API_KEY=${LOCALSTACK_API_KEY:-}  # Optional: for Pro features
      
      # AWS Services to enable
      - SERVICES=lambda,s3,dynamodb,apigateway,cloudwatch,logs,iam,sts
      
      # AWS Configuration
      - AWS_DEFAULT_REGION=us-west-2
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      
      # Data persistence
      - PERSISTENCE=${PERSISTENCE:-1}
      - DATA_DIR=/tmp/localstack/data
      
      # Lambda configuration
      - LAMBDA_STAY_OPEN_MODE=1
      - LAMBDA_REMOVE_CONTAINERS=true
      - LAMBDA_DOCKER_NETWORK=bridge
      
      # S3 configuration
      - S3_SKIP_SIGNATURE_VALIDATION=1
      
      # Enable CORS for API Gateway
      - EXTRA_CORS_ALLOWED_ORIGINS=*
      - EXTRA_CORS_ALLOWED_HEADERS=*
      
      # Logging
      - LS_LOG=warn
      
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./lambda:/opt/code/localstack/lambda"  # Mount lambda code
      - "./test_images:/opt/test_images"         # Mount test images
    networks:
      - opencv-test

  # Optional: LocalStack Web UI (Pro feature)
  localstack-web:
    container_name: localstack-web
    image: localstack/localstack-web:latest
    ports:
      - "127.0.0.1:8080:3000"
    environment:
      - LOCALSTACK_URL=http://localstack:4566
    depends_on:
      - localstack
    networks:
      - opencv-test
    profiles:
      - web-ui

networks:
  opencv-test:
    driver: bridge

volumes:
  localstack-data:
    driver: local
