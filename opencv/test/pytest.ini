# pytest.ini - Pytest configuration file for LocalStack testing

[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    s3: S3 operations tests
    lambda_func: Lambda function tests  
    dynamodb: DynamoDB operations tests
    api_gateway: API Gateway integration tests
    integration: End-to-end integration tests
    slow: Slow running tests (>10 seconds)
    performance: Performance and load tests
    
# Output options
addopts = 
    --strict-markers
    --strict-config
    --tb=short
    --disable-warnings
    --color=yes
    --durations=10
    
# Minimum version
minversion = 6.0

# Test timeout (seconds)
timeout = 300

# Parallel execution
# Note: Use -n option in command line for parallel execution
# Example: pytest -n 4

# Coverage options (when using --cov)
# These are applied when --cov is used in command line
# Example: pytest --cov=. --cov-report=html

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Disable specific warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:botocore.*
    ignore::UserWarning:urllib3.*
    
# Test collection
collect_ignore = [
    "setup.py",
    "build",
    "dist",
    ".tox",
    ".git",
    "__pycache__"
]

# XFail conditions
xfail_strict = false

# Custom markers for specific test scenarios
# Use with: pytest -m "not slow" to skip slow tests
# Use with: pytest -m "s3 and not performance" for specific combinations
