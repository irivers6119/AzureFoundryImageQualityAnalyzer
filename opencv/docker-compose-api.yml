version: '3.8'

services:
  opencv-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencv-api-server
    ports:
      - "8000:8000"
    volumes:
      # Mount the images directory from the parent folder (read-only)
      - ../images:/app/images:ro
      # Mount the output directory for results (read-write)
      - ../output:/app/output:rw
      # Mount logs directory
      - ./logs:/app/logs:rw
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_WORKERS=1
      - ANALYSIS_PROFILE=general
      - MAX_WORKERS=4
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - opencv-net
    command: ["api"]

  # Optional: nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: opencv-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl:ro
    depends_on:
      opencv-api:
        condition: service_healthy
    networks:
      - opencv-net
    profiles:
      - proxy
    restart: unless-stopped

  # Optional: Redis for caching (if needed for high-performance scenarios)
  redis:
    image: redis:7-alpine
    container_name: opencv-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - opencv-net
    profiles:
      - cache
    restart: unless-stopped

  # Optional: Prometheus monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: opencv-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - opencv-net
    profiles:
      - monitoring
    restart: unless-stopped

  # Optional: Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: opencv-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - opencv-net
    profiles:
      - monitoring
    restart: unless-stopped

networks:
  opencv-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# Usage examples:
#
# Start API service only:
#   docker-compose up opencv-api
#
# Start with nginx proxy:
#   docker-compose --profile proxy up
#
# Start with monitoring:
#   docker-compose --profile monitoring up
#
# Start with caching:
#   docker-compose --profile cache up
#
# Start everything:
#   docker-compose --profile proxy --profile monitoring --profile cache up
